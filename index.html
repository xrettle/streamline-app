<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Streamline</title>
  <!-- HLS.js for SoundCloud HLS streaming -->
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  <!-- Tidal Web SDK (auth + player web components) -->
  <script type="module">
    // Tidal SDK modules loaded via ESM from unpkg
    // @tidal-music/auth and @tidal-music/player-web-components
    // Imported dynamically below in tidalAuth()
  </script>
  <style>
    /* ===== CSS Reset & Base ===== */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg-primary: #0d0d0d;
      --bg-secondary: #181818;
      --bg-tertiary: #282828;
      --bg-hover: #333;
      --text-primary: #fff;
      --text-secondary: #b3b3b3;
      --accent: #1db954;
      --accent-hover: #1ed760;
      --border: #333;
      --player-bg: #181818;
      --sidebar-width: 240px;
      --player-height: 90px;
    }
    body.light {
      --bg-primary: #f5f5f5;
      --bg-secondary: #fff;
      --bg-tertiary: #e8e8e8;
      --bg-hover: #ddd;
      --text-primary: #111;
      --text-secondary: #555;
      --accent: #1db954;
      --accent-hover: #17a349;
      --border: #ccc;
      --player-bg: #fff;
    }
    html, body { height: 100%; background: var(--bg-primary); color: var(--text-primary); font-family: 'Segoe UI', Arial, sans-serif; overflow: hidden; }

    /* ===== Layout ===== */
    #app { display: grid; grid-template-columns: var(--sidebar-width) 1fr; grid-template-rows: 1fr var(--player-height); height: 100vh; }
    #sidebar { grid-row: 1; grid-column: 1; background: #000; overflow-y: auto; display: flex; flex-direction: column; border-right: 1px solid var(--border); }
    #main-content { grid-row: 1; grid-column: 2; overflow-y: auto; background: var(--bg-primary); padding: 0; }
    #player-bar { grid-row: 2; grid-column: 1 / -1; background: var(--player-bg); border-top: 1px solid var(--border); display: flex; align-items: center; padding: 0 16px; gap: 16px; z-index: 100; }

    /* ===== Sidebar ===== */
    .sidebar-logo { padding: 24px 16px 16px; font-size: 1.4rem; font-weight: 800; color: var(--text-primary); letter-spacing: -0.5px; }
    .sidebar-logo span { color: var(--accent); }
    .sidebar-nav { list-style: none; padding: 0 8px; }
    .sidebar-nav li { margin-bottom: 2px; }
    .sidebar-nav li a { display: flex; align-items: center; gap: 12px; padding: 10px 12px; border-radius: 6px; color: var(--text-secondary); text-decoration: none; font-size: 0.9rem; font-weight: 500; cursor: pointer; transition: background 0.15s, color 0.15s; }
    .sidebar-nav li a:hover, .sidebar-nav li a.active { background: var(--bg-hover); color: var(--text-primary); }
    .sidebar-nav li a svg { width: 20px; height: 20px; flex-shrink: 0; }
    .sidebar-section-title { padding: 16px 20px 6px; font-size: 0.72rem; text-transform: uppercase; letter-spacing: 1px; color: var(--text-secondary); }
    .sidebar-footer { margin-top: auto; padding: 12px 16px; border-top: 1px solid var(--border); }
    .sidebar-footer button { width: 100%; padding: 8px; background: var(--accent); color: #000; border: none; border-radius: 20px; font-weight: 700; font-size: 0.85rem; cursor: pointer; }
    .sidebar-footer button:hover { background: var(--accent-hover); }

    /* ===== Player Bar ===== */
    #player-bar { min-height: var(--player-height); }
    .player-track { display: flex; align-items: center; gap: 12px; min-width: 180px; max-width: 260px; flex: 1; }
    .player-track-art { width: 52px; height: 52px; border-radius: 4px; background: var(--bg-tertiary); object-fit: cover; flex-shrink: 0; cursor: pointer; }
    .player-track-info { overflow: hidden; }
    .player-track-title { font-size: 0.85rem; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .player-track-artist { font-size: 0.75rem; color: var(--text-secondary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .player-track-like { background: none; border: none; cursor: pointer; color: var(--text-secondary); margin-left: 8px; padding: 4px; }
    .player-track-like.liked { color: var(--accent); }
    .player-controls { flex: 2; display: flex; flex-direction: column; align-items: center; gap: 6px; }
    .player-buttons { display: flex; align-items: center; gap: 16px; }
    .ctrl-btn { background: none; border: none; cursor: pointer; color: var(--text-secondary); padding: 4px; border-radius: 50%; transition: color 0.15s; display: flex; align-items: center; justify-content: center; }
    .ctrl-btn:hover { color: var(--text-primary); }
    .ctrl-btn.active { color: var(--accent); }
    #play-pause-btn { width: 36px; height: 36px; background: var(--text-primary); border-radius: 50%; color: #000; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: transform 0.1s; }
    #play-pause-btn:hover { transform: scale(1.06); }
    .player-progress { width: 100%; display: flex; align-items: center; gap: 8px; font-size: 0.72rem; color: var(--text-secondary); }
    .progress-bar-wrap { flex: 1; height: 4px; background: var(--bg-tertiary); border-radius: 2px; cursor: pointer; position: relative; }
    .progress-bar-fill { height: 100%; background: var(--text-secondary); border-radius: 2px; width: 0%; transition: width 0.5s linear; pointer-events: none; }
    .progress-bar-wrap:hover .progress-bar-fill { background: var(--accent); }
    .player-right { display: flex; align-items: center; gap: 12px; min-width: 180px; justify-content: flex-end; flex: 1; }
    .volume-wrap { display: flex; align-items: center; gap: 6px; }
    .volume-wrap input[type=range] { width: 80px; accent-color: var(--accent); cursor: pointer; }

    /* ===== Modals ===== */
    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 1000; align-items: center; justify-content: center; }
    .modal-overlay.open { display: flex; }
    .modal-box { background: var(--bg-secondary); border-radius: 12px; padding: 28px; width: 480px; max-width: 95vw; max-height: 85vh; overflow-y: auto; position: relative; }
    .modal-title { font-size: 1.1rem; font-weight: 700; margin-bottom: 16px; }
    .modal-close { position: absolute; top: 14px; right: 16px; background: none; border: none; color: var(--text-secondary); font-size: 1.3rem; cursor: pointer; }
    .modal-close:hover { color: var(--text-primary); }
    .modal-box textarea { width: 100%; height: 180px; background: var(--bg-tertiary); color: var(--text-primary); border: 1px solid var(--border); border-radius: 6px; padding: 10px; font-size: 0.8rem; font-family: monospace; resize: vertical; }
    .modal-meta { font-size: 0.78rem; color: var(--text-secondary); margin: 8px 0; }
    .modal-actions { display: flex; gap: 10px; margin-top: 14px; flex-wrap: wrap; }
    .btn { padding: 8px 18px; border-radius: 20px; border: none; cursor: pointer; font-weight: 600; font-size: 0.85rem; transition: background 0.15s; }
    .btn-primary { background: var(--accent); color: #000; }
    .btn-primary:hover { background: var(--accent-hover); }
    .btn-secondary { background: var(--bg-tertiary); color: var(--text-primary); border: 1px solid var(--border); }
    .btn-secondary:hover { background: var(--bg-hover); }

    /* ===== Toast ===== */
    #toast-container { position: fixed; bottom: calc(var(--player-height) + 16px); right: 16px; z-index: 2000; display: flex; flex-direction: column; gap: 8px; }
    .toast { background: var(--bg-secondary); color: var(--text-primary); border-left: 4px solid var(--accent); border-radius: 6px; padding: 10px 16px; font-size: 0.85rem; min-width: 220px; max-width: 340px; box-shadow: 0 4px 20px rgba(0,0,0,0.4); opacity: 1; transition: opacity 0.4s; }
    .toast.error { border-left-color: #e74c3c; }
    .toast.info { border-left-color: #3498db; }
    .toast.fade-out { opacity: 0; }

    /* ===== Main Content placeholder ===== */
    #home-view { padding: 32px; }
    #home-view h1 { font-size: 1.8rem; font-weight: 800; margin-bottom: 8px; }

    /* ===== Card Rows ===== */
    .card-row { display: flex; gap: 16px; overflow-x: auto; padding-bottom: 8px; scroll-snap-type: x mandatory; }
    .card-row::-webkit-scrollbar { height: 4px; }
    .card-row::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
    .card { min-width: 160px; max-width: 180px; scroll-snap-align: start; background: var(--bg-secondary); border-radius: 10px; padding: 12px; cursor: pointer; transition: background 0.15s; }
    .card:hover { background: var(--bg-tertiary); }
    .card-art { width: 100%; aspect-ratio: 1; object-fit: cover; border-radius: 6px; background: var(--bg-tertiary); display: block; }
    .card-title { font-size: 0.85rem; font-weight: 600; margin-top: 8px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .card-sub { font-size: 0.75rem; color: var(--text-secondary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .aoty-badge { display: inline-block; background: var(--accent); color: #000; font-size: 0.65rem; font-weight: 700; padding: 2px 5px; border-radius: 3px; margin-top: 4px; }

    /* ===== Fullscreen Player ===== */
    #fullscreen-player { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: none; z-index: 2500; }
    #fullscreen-player.open { display: flex; align-items: center; justify-content: center; }
    #fullscreen-player .fullscreen-bg { position: absolute; inset: 0; background-size: cover; background-position: center; filter: blur(60px) brightness(0.3) saturate(1.4); transform: scale(1.1); }
    #fullscreen-player .fullscreen-content { position: relative; z-index: 1; width: 100%; max-width: 900px; padding: 32px 24px 24px; display: flex; flex-direction: column; align-items: center; gap: 24px; }
    .fullscreen-topbar { width: 100%; display: flex; justify-content: flex-end; }
    .fullscreen-close-btn { background: none; border: none; color: var(--text-secondary); font-size: 1.4rem; cursor: pointer; }
    .fullscreen-layout { display: flex; flex-direction: column; align-items: center; gap: 16px; }
    .fullscreen-art { width: 280px; height: 280px; border-radius: 12px; object-fit: cover; box-shadow: 0 20px 40px rgba(0,0,0,0.5); }
    .fullscreen-title { font-size: 1.75rem; font-weight: 700; text-align: center; }
    .fullscreen-artist { font-size: 1rem; color: var(--text-secondary); }
    .fullscreen-controls { width: 100%; max-width: 640px; display: flex; flex-direction: column; gap: 16px; }
    .fullscreen-progress { display: flex; align-items: center; gap: 8px; font-size: 0.8rem; color: var(--text-secondary); }
    .fullscreen-progress-bar { flex: 1; height: 4px; background: var(--bg-tertiary); border-radius: 2px; cursor: pointer; position: relative; }
    .fullscreen-progress-fill { height: 100%; background: var(--accent); border-radius: 2px; width: 0%; }
    #visualizer-canvas { width: 100%; height: 64px; }
    .fullscreen-buttons-row { display: flex; justify-content: center; gap: 18px; }
    .fullscreen-bottom-row { display: flex; justify-content: flex-end; }
    .fullscreen-lyrics-btn { background: none; border-radius: 999px; border: 1px solid var(--border); padding: 6px 14px; color: var(--text-secondary); cursor: pointer; font-size: 0.8rem; }

    /* ===== Context Menu ===== */
    #context-menu { display:none;position:fixed;background:var(--bg-secondary);border:1px solid var(--border);border-radius:8px;padding:4px 0;z-index:3000;min-width:160px;box-shadow:0 8px 24px rgba(0,0,0,0.4); }
    #context-menu .ctx-item { width:100%;text-align:left;padding:6px 12px;background:none;border:none;color:var(--text-primary);font-size:0.85rem;cursor:pointer; }
    #context-menu .ctx-item:hover { background:var(--bg-hover); }

    /* ===== Responsive ===== */
    @media (max-width: 768px) {
      #app {
        grid-template-columns: 1fr;
        grid-template-rows: 1fr 56px 72px;
      }
      #sidebar { display: none; }
      #main-content { grid-row: 1; grid-column: 1; }
      #player-bar { grid-row: 3; grid-column: 1; }
      #mobile-tab-bar { display: flex; }

      .player-track-art { width: 40px; height: 40px; }
      .player-right { display: none; }
      .player-controls .player-buttons .ctrl-btn:not(#play-pause-btn):not([onclick*="next"]):not([onclick*="prev"]) { display: none; }
    }

    @media (min-width: 769px) {
      #mobile-tab-bar { display: none; }
    }
  </style>
</head>

</html>
